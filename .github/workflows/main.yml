name: Build and Publish Unsigned iOS IPA

on:
  push:
    tags:
      - 'v*' # Запуск при пуше тегов вроде v1.0.0
  workflow_dispatch: # Позволяет запускать сборку вручную из интерфейса GitHub

jobs:
  build:
    runs-on: macos-26 # Для работы xcodebuild и gomobile нужна macOS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' # Укажите нужную версию Go, если требуется конкретная

      - name: Install dependencies (XcodeGen)
        run: |
          brew install xcodegen

      - name: Make script executable
        run: chmod +x ./apple/Scripts/build-ios-unsigned-local-ipa.sh # Путь к вашему скрипту в репозитории

      - name: Run Build Script
        env:
          CONFIGURATION: Release
        run: |
          # Запускаем ваш скрипт
          ./apple/Scripts/build-ios-unsigned-local-ipa.sh

      - name: Find generated IPA
        id: locate_ipa
        run: |
          # Скрипт складывает всё в apple/.build/ios-unsigned-local/
          IPA_PATH="apple/.build/ios-unsigned-local/Godwit-unsigned-local.ipa"
          if [ -f "$IPA_PATH" ]; then
            echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          else
            echo "Error: IPA not found at $IPA_PATH"
            exit 1
          fi

      - name: Upload IPA to Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Godwit-unsigned-local-ipa
          path: ${{ steps.locate_ipa.outputs.ipa_path }}
          if-no-files-found: error

      - name: Create GitHub Release and Upload Asset
        if: startsWith(github.ref, 'refs/tags/') # Публикация в релизы только если был пуш тега
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate_ipa.outputs.ipa_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
